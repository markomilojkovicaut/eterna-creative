name: Upwork Lead Scout

on:
  schedule:
    # Every hour 07:00–20:00 UTC = 09:00–21:00 Belgrade (CET) / 09:00–22:00 (CEST)
    - cron: '0 7-20 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scout:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: upwork-proposals

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: upwork-proposals/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lead scout
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python notify_leads.py --max-age 2
